<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSGames Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a2e;
            color: #e94560;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: #16213e;
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            margin-bottom: 3rem;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            color: #0f3460;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            background: -webkit-linear-gradient(#e94560, #ff8a00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            width: 90%;
            max-width: 1200px;
            padding: 1rem;
        }

        .card {
            background-color: #0f3460;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4);
            background-color: #124075;
        }

        .card h2 {
            margin: 0;
            font-size: 1.8rem;
            color: #e94560;
            margin-bottom: 1rem;
        }

        .card p {
            color: #ccc;
            margin-bottom: 0;
            font-size: 1.1rem;
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            color: #777;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <header>
        <h1>JSGames Collection</h1>
    </header>

    <div class="container">
        <a href="Arkade3/" class="card">
            <h2>Arkade 3</h2>
            <p>Play Game</p>
        </a>
        <a href="Arkade_slow/" class="card">
            <h2>Arkade Slow</h2>
            <p>Play Game</p>
        </a>
        <a href="Ping Pong/" class="card">
            <h2>Ping Pong</h2>
            <p>Play Game</p>
        </a>

    </div>

    <footer>
        &copy; JSGames Project Hub
    </footer>

</body>

</html>
